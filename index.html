<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Imágenes de la NASA</title>
</head>
<body>
    <div id="tsparticles"></div>

    <header class="header">
        <h1 class="header__title">Imágenes de la NASA</h1>
        <p class="header__description">Busca y guarda imágenes astronómicas del día</p>
    </header>

    <main class="poke-app">

        <div class="search-box">

            <!-- Botón guardar a favoritos (oculto hasta que se cargue un APOD) -->
            <button id="btnAgregarApodFavorito" class="search-box__button-search search-box__button-keep" style="display:none;">♥ Guardar favorito</button>

            <!-- Contenedor donde se muestra el resultado -->
            <div class="show-box__box-bg" style="margin-top: 20px;">
                <div class="show-pokemon">
                    <h3 class="search-box__title show-box__title">Imagen del día</h3>
                    <div id="resultadoApod" class="show-box__card">
                        <!-- Aquí se inyecta el APOD -->
                    </div>
                </div>
            </div>

        </div>

        <section class="favorites-box">

            <h2 class="search-box__title">BÚSQUEDA DE IMAGEN POR FECHA</h2>

            <input class="search-box__input" type="date" id="customDate" placeholder="Selecciona una fecha">
            <button id="btnBuscarApod" class="search-box__button-search">🔎</button>

            <h4 class="search-box__title" style="margin-top: 24px;">Mis favoritos ⭐</h4>

            <div id="listaApodFavoritos" class="favorites-cards">
                <!-- Las tarjetas de favoritos se generan aquí -->
            </div>

        </section>

    </main>

    <!-- tsParticles desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <!-- Inicialización de partículas -->
    <script src="js/particles.js"></script>
    <!-- Lógica principal -->
    <script src="js/app.js"></script>
</body>
</html>
